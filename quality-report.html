
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>UQF Dashboard</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 40px; text-align: center; }
            .card { background: #1e293b; padding: 24px; border-radius: 12px; max-width: 800px; margin: auto; }
            .metric { font-size: 3.5rem; color: #22c55e; font-weight: bold; }
            .chart-box { height: 400px; margin-top: 20px; }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>🛡️ UQF Evolution</h1>
            <div class="metric">98.2%</div>
            <div class="chart-box"><canvas id="trendChart"></canvas></div>
        </div>
        <script>
            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: ["Run #1","Run #2","Run #3","Run #4","Run #5","Run #6","Run #7","Run #8","Run #9","Run #10","Run #11","Run #12","Run #13","Run #14","Run #15","Run #16","Run #17","Run #18","Run #19","Run #20","Run #21","Run #22","Run #23","Run #24","Run #25"],
                    datasets: [{
                        label: 'Score',
                        data: [96.1,92.5,94.1,93.8,96.5,98.2,80,92.5,94.1,93.8,96.5,98.2,80,100,92.5,94.1,93.8,96.5,98.2,100,92.5,94.1,93.8,96.5,98.2],
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        </script>
    </body>
    </html>
