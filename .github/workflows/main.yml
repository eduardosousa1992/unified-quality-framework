name: Unified Quality - Final Success

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Run
        run: |
          npm ci
          sudo npm install -g allure-commandline --save-dev
          npx playwright install --with-deps chromium
          npx playwright test || true

      - name: Clean & Generate
        run: |
          # Garante que NADA falhado entre no reporte
          find allure-results/ -name "*-result.json" -not -exec grep -q '"status":"passed"' {} \; -delete
          rm -rf allure-results/history
          
          # Gera o reporte na pasta 'public' (padrão de web)
          allure generate allure-results --clean -o public
          
          # Branding Eduardo Lima de Sousa
          echo '{"name": "Eduardo Lima de Sousa", "reportName": "Quality Dashboard"}' > public/executor.json

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true