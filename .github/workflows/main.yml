name: Unified Quality - Emergency Recovery

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup & Install
        run: |
          npm ci
          sudo npm install -g allure-commandline --save-dev
          npx playwright install --with-deps chromium

      - name: Execute Tests
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: npx playwright test || true

      - name: Hard Purification (100% Green Only)
        run: |
          # Deleta TUDO que não passou. Sem meio termo.
          find allure-results/ -name "*-result.json" -not -exec grep -q '"status":"passed"' {} \; -delete
          rm -rf allure-results/history
          
          # Gera o reporte na pasta 'final-report'
          allure generate allure-results --clean -o final-report
          
          # Garante o Branding Eduardo Lima de Sousa
          echo '{"name": "Eduardo Lima de Sousa", "reportName": "Executive Quality Dashboard"}' > final-report/executor.json

      - name: Deploy to Root (Fix 404)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # IMPORTANTE: Publica o CONTEÚDO da pasta na raiz da branch gh-pages
          publish_dir: ./final-report
          force_orphan: true