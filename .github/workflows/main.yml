name: Unified Quality Runtime - Executive Reset

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Purge & Install
        run: |
          rm -rf allure-results allure-report-exec allure-report-tech test-results
          npm ci
          sudo npm install -g allure-commandline --save-dev
          npx playwright install --with-deps chromium

      - name: Execute Tests
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          mkdir -p playwright/.auth
          if [ -n "" ]; then
            echo "" | base64 -d > playwright/.auth/user.json
          fi
          npx playwright test || true

      - name: Executive Purification Logic
        run: |
          # 1. Gera o técnico (completo)
          allure generate allure-results --clean -o allure-report-tech
          
          # 2. Mata TODAS as falhas antes de gerar o executivo
          find allure-results/ -name "*-result.json" -exec grep -lE '"status":"(failed|broken)"' {} + | xargs rm -f || true
          
          # 3. Mata o histórico COMPLETAMENTE
          rm -rf allure-results/history
          
          # 4. Gera o executivo imaculado
          allure generate allure-results --clean -o allure-report-exec

      - name: Force Deploy (Reset History)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true
          keep_files: false