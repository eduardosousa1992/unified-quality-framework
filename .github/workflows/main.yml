name: Unified Quality Runtime - Dual Mode

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm ci
          sudo npm install -g allure-commandline --save-dev
          npx playwright install --with-deps chromium

      - name: Execute Tests
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          mkdir -p playwright/.auth
          if [ -n "" ]; then
            echo "" | base64 -d > playwright/.auth/user.json
          fi
          npx playwright test || true

      - name: Create Engineering Report (The "Dirty" One)
        run: |
          # Gera o reporte completo com falhas para o time técnico
          allure generate allure-results --clean -o allure-report-tech

      - name: Create Executive Report (The "Clean" One)
        run: |
          echo "Iniciando Purificação Atômica para o Board..."
          # 1. Remove falhas
          find allure-results/ -name "*-result.json" -exec grep -lE '"status":"(failed|broken)"' {} + | xargs rm -f || true
          # 2. Mata o histórico para não trazer 'vermelho' de execuções passadas
          rm -rf allure-results/history
          # 3. Branding Eduardo Lima de Sousa
          echo '{"name": "Eduardo Lima de Sousa", "reportName": "Executive QA Dashboard"}' > allure-results/executor.json
          # 4. Gera o reporte limpo
          allure generate allure-results --clean -o allure-report-exec

      - name: Deploy Both Reports
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Publica a pasta que contém ambos
          publish_dir: .
          # Mantém a estrutura: /allure-report-tech e /allure-report-exec