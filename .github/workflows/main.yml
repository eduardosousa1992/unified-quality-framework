name: Unified Quality Runtime

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Quality Engine (Docker)
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          # Garantir que o diretório de auth existe antes de rodar o Docker
          mkdir -p playwright/.auth
          
          # Injetar a sessão base64 se ela existir, senão o teste falhará propositalmente
          if [ -n "" ]; then
            echo "Injetando sessão de governança..."
            echo "" | base64 -d > playwright/.auth/user.json
          fi
          
          # Rodar o framework via Docker
          docker build -t unified-framework .
          docker run --rm -v $(pwd)/allure-results:/app/allure-results unified-framework npm test || true

      - name: Generate Allure Report
        run: |
          # Correção da sintaxe Allure 3.x
          npx allure generate ./allure-results --clean -o ./allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report