name: Unified Quality - Professional Delivery

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Run
        run: |
          npm ci
          npm install -D allure-playwright allure-commandline
          npx playwright install --with-deps chromium
          # Executa gerando os dois reports simultaneamente
          npx playwright test --reporter=html,allure-playwright || true

      - name: Final Allure Generation
        run: |
          # Remove o histórico para limpar as 35 falhas acumuladas
          rm -rf allure-results/history
          # Gera o Allure completo (sem filtros manuais que causam o 'vazio')
          npx allure generate allure-results --clean -o public
          # Branding
          echo '{"name": "Eduardo Lima de Sousa", "reportName": "Quality Governance Dashboard"}' > public/executor.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true

      - name: Save Evidence (HTML Report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence
          path: playwright-report/
          retention-days: 7