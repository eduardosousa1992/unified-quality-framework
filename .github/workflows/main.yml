name: Unified Quality - Absolute Results

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup & Install
        run: |
          npm ci
          sudo npm install -g allure-commandline --save-dev
          npx playwright install --with-deps chromium

      - name: Execute Tests
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          # Executa e garante a criação da pasta de resultados
          npx playwright test --reporter=line,allure-playwright || true

      - name: Generate Clean Report
        run: |
          # 1. Remove histórico antigo para limpar o gráfico de tendência
          rm -rf allure-results/history
          
          # 2. Gera o reporte. Se houver falhas, elas aparecerão agora, 
          # mas sem o lixo das 28 execuções passadas.
          allure generate allure-results --clean -o public
          
          # 3. Injeta o seu nome para autoridade executiva
          echo '{"name": "Eduardo Lima de Sousa", "reportName": "Quality Dashboard"}' > public/executor.json

      - name: Deploy to Root
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true