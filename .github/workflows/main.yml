name: Unified Quality Runtime

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Allure & Dependencies
        run: |
          npm ci
          # Instalação global do Allure para evitar conflitos de npx
          sudo npm install -g allure-commandline --save-dev

      - name: Execute Quality Engine (Native)
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          mkdir -p playwright/.auth
          
          # Injeção da Sessão de Eduardo
          if [ -n "" ]; then
            echo "Injetando sessão de governança..."
            echo "" | base64 -d > playwright/.auth/user.json
          fi
          
          # Roda os testes e garante que continue mesmo se falhar
          npx playwright test || true

      - name: Executive Filter & Branding
        run: |
          echo "Limpando ruídos e injetando metadados de Eduardo Lima de Sousa..."
          # Filtra para deixar apenas o que passou (se desejar ver apenas verde)
          # find allure-results/ -name "*-result.json" -exec grep -l '"status":"failed"' {} + | xargs rm -f || true
          
          # Garante o Branding no Reporte
          echo '{"name": "Eduardo Lima de Sousa", "reportName": "QA Executive Dashboard"}' > allure-results/executor.json

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report